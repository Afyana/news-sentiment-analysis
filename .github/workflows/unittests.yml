name: Python CI

on:
  push:
    branches: [ main, task-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy pytest black
    
    - name: Check Python syntax
      run: |
        python -m py_compile src/*.py 2>/dev/null || true
        python -m py_compile tests/*.py 2>/dev/null || true
    
    - name: Lint with black (check only)
      run: |
        black --check src/ tests/ --diff || true